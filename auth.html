<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户认证 - 中国古建筑</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700;900&display=swap');
        
        body {
            font-family: 'Noto Serif SC', 'SimSun', 'STSong', serif;
            background-color: #f5f5f5;
            color: #333;
            background-image: url('assets/forum-background.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 100px 20px 40px;
        }
        
        /* 导航栏 */
        .navbar {
            background: linear-gradient(135deg, #2C3E50 0%, #1A252F 100%);
            padding: 12px 30px;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid #8B4513;
            box-shadow: 0 2px 15px rgba(0,0,0,0.5);
            box-sizing: border-box;
            min-height: 70px;
        }
        .navbar-brand {
            color: #DAA520;
            font-size: 1.2rem;
            font-weight: 900;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: 'Noto Serif SC', 'SimSun', 'STSong', serif;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            flex-shrink: 0;
            white-space: nowrap;
            max-width: 200px;
        }
        .navbar-brand img {
            width: 36px;
            height: 36px;
            border-radius: 4px;
            flex-shrink: 0;
        }
        .navbar-brand .brand-text {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 2px;
        }
        .navbar-brand .brand-main {
            color: #DAA520;
            font-size: 1.1rem;
            font-weight: 900;
            line-height: 1.2;
            white-space: nowrap;
        }
        .navbar-brand .brand-sub {
            color: #DAA520;
            font-size: 0.65rem;
            font-family: Arial, sans-serif;
            opacity: 0.9;
            line-height: 1;
            white-space: nowrap;
        }
        .navbar-menu {
            display: flex;
            gap: 2px;
            list-style: none;
            align-items: stretch;
            flex-wrap: nowrap;
            min-width: 0;
            flex: 1;
            justify-content: center;
            margin: 0 5px;
            overflow: visible;
        }
        .navbar-menu li {
            flex: 0 1 auto;
            position: relative;
            display: flex;
            align-items: center;
        }
        .navbar-menu a {
            color: #DAA520;
            text-decoration: none;
            font-size: 0.8rem;
            transition: all 0.3s;
            position: relative;
            font-family: 'Noto Serif SC', 'SimSun', 'STSong', serif;
            padding: 4px 6px;
            border-radius: 4px;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1.2;
            white-space: nowrap;
            min-width: 40px;
            max-width: 140px;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .navbar-menu a:hover {
            color: #F5DEB3;
            background: rgba(245,222,179,0.1);
        }
        .navbar-menu a::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 2px;
            background: #DAA520;
            transition: width 0.3s;
        }
        .navbar-menu a:hover::after {
            width: 80%;
        }
        
        /* 下拉菜单 */
        .dropdown {
            position: relative;
        }
        
        .dropdown-toggle {
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            line-height: 1.2;
            padding: 4px 6px;
            border-radius: 4px;
            color: #DAA520;
            text-decoration: none;
            font-size: 0.8rem;
            transition: all 0.3s;
            position: relative;
            font-family: 'Noto Serif SC', 'SimSun', 'STSong', serif;
            font-weight: 500;
            white-space: nowrap;
            min-width: 40px;
            max-width: 140px;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .dropdown-toggle:hover {
            color: #F5DEB3;
            background: rgba(245,222,179,0.1);
        }
        
        .dropdown-menu {
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            background: #1A252F;
            border: 1px solid #8B4513;
            border-radius: 4px;
            padding: 8px 0;
            min-width: 200px;
            max-width: 280px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            z-index: 1000;
            display: none;
            margin-top: 2px;
        }
        
        .dropdown:hover .dropdown-menu {
            display: block;
        }
        
        .dropdown-menu a {
            display: block;
            padding: 8px 15px;
            color: #DAA520;
            text-decoration: none;
            transition: all 0.3s;
            font-size: 0.8rem;
            border-radius: 0;
            white-space: normal;
            line-height: 1.4;
            text-align: left;
            min-width: auto;
            max-width: none;
            overflow: visible;
            text-overflow: clip;
        }
        
        .dropdown-menu a:hover {
            background: rgba(139,69,19,0.2);
            color: #F5DEB3;
        }
        
        .navbar-content {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: flex-end;
            flex-shrink: 0;
            max-width: 35%;
        }
        
        .navbar-search {
            display: flex;
            align-items: center;
            flex-shrink: 0;
        }
        
        .search-input {
            padding: 6px 10px;
            border: 2px solid #8B4513;
            border-right: none;
            border-radius: 4px 0 0 4px;
            background: rgba(255,255,255,0.9);
            color: #333;
            font-size: 0.8rem;
            outline: none;
            transition: all 0.3s;
            font-family: 'Noto Serif SC', 'SimSun', 'STSong', serif;
            width: 150px;
        }
        
        .search-input:focus {
            background: rgba(255,255,255,1);
            border-color: #DAA520;
        }
        
        .search-button {
            padding: 6px 12px;
            background: #27ae60;
            border: 2px solid #27ae60;
            border-radius: 0 4px 4px 0;
            color: white;
            font-size: 0.8rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Noto Serif SC', 'SimSun', 'STSong', serif;
            white-space: nowrap;
        }
        
        .search-button:hover {
            background: #229954;
            border-color: #229954;
        }
        
        /* 翻译按钮 */
        .translate-btn {
            padding: 6px 10px;
            background: #3498db;
            border: 2px solid #3498db;
            border-radius: 4px;
            color: white;
            font-size: 0.75rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Noto Serif SC', 'SimSun', 'STSong', serif;
            display: flex;
            align-items: center;
            gap: 4px;
            flex-shrink: 0;
            white-space: nowrap;
        }
        
        .translate-btn:hover {
            background: #2980b9;
            border-color: #2980b9;
        }
        
        .translate-btn img {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            object-fit: cover;
        }
        
        .auth-container {
            max-width: 400px;
            margin: 50px auto;
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }
        
        .auth-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .auth-header h2 {
            color: #8B4513;
            margin-bottom: 10px;
        }
        
        .auth-header p {
            color: #666;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: 500;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #8B4513;
            box-shadow: 0 0 0 2px rgba(139, 69, 19, 0.1);
        }
        
        .btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #8B4513 0%, #CD853F 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.3s;
        }
        
        .btn:hover {
            background: linear-gradient(135deg, #CD853F 0%, #8B4513 100%);
        }
        
        .auth-footer {
            text-align: center;
            margin-top: 20px;
            color: #666;
        }
        
        .auth-footer a {
            color: #8B4513;
            text-decoration: none;
            font-weight: 500;
        }
        
        .auth-footer a:hover {
            text-decoration: underline;
        }
        
        .toggle-form {
            margin-top: 15px;
            text-align: center;
        }
        
        .toggle-form a {
            color: #8B4513;
            text-decoration: none;
            font-weight: 500;
        }
        
        .toggle-form a:hover {
            text-decoration: underline;
        }
        
        .error-message {
            background: #ffebee;
            color: #c62828;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 20px;
            display: none;
        }
        
        .success-message {
            background: #e8f5e8;
            color: #2e7d32;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 20px;
            display: none;
        }
        
        #login-form {
            display: block;
        }
        
        #register-form {
            display: none;
        }
        
        @media (max-width: 768px) {
            .auth-container {
                margin: 30px 20px;
                padding: 30px;
            }
            
            .header-content {
                flex-direction: column;
                align-items: flex-start;
            }
            
            nav ul {
                margin-top: 15px;
            }
            
            nav ul li {
                margin-left: 0;
                margin-right: 15px;
            }
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <a href="index.html" class="navbar-brand">
            <img src="assets/logo.png" alt="中国古代建筑文化平台">
            <div class="brand-text">
                <span class="brand-main">中国古代建筑</span>
                <span class="brand-sub">Cross-Border Exchange Platform</span>
            </div>
        </a>
        <ul class="navbar-menu">
            <li><a href="index.html">首页</a></li>
            <li><a href="cultural-cities.html">建筑欣赏</a></li>
            <li><a href="test-ai.html">AI 问答</a></li>
            <li><a href="forum.html">论坛交流</a></li>
            <li><a href="auth.html">登录/注册</a></li>
        </ul>
        <div class="navbar-content">
            <div class="navbar-search">
                <input type="text" class="search-input" id="searchInput" placeholder="搜索中国古代建筑知识..." onkeypress="if(event.key === 'Enter') search()">
                <button class="search-button" onclick="search()">搜索</button>
            </div>
            <button class="translate-btn" onclick="toggleTranslator()" title="智能翻译">
                <img src="assets/translation-logo.jpg" alt="翻译">
                翻译
            </button>
        </div>
    </nav>
    
    <div class="container">
        <div class="auth-container">
            <div class="auth-header">
                <h2 id="auth-title">用户登录</h2>
                <p id="auth-subtitle">请输入您的账号信息</p>
            </div>
            
            <div class="error-message" id="error-message"></div>
            <div class="success-message" id="success-message"></div>
            
            <!-- 登录表单 -->
            <form id="login-form">
                <div class="form-group">
                    <label for="login-email">邮箱</label>
                    <input type="email" id="login-email" placeholder="请输入邮箱" required>
                </div>
                <div class="form-group">
                    <label for="login-password">密码</label>
                    <input type="password" id="login-password" placeholder="请输入密码" required>
                </div>
                <button type="submit" class="btn">登录</button>
                <div class="toggle-form">
                    <p>还没有账号？ <a href="#" id="toggle-register">立即注册</a></p>
                </div>
            </form>
            
            <!-- 注册表单 -->
            <form id="register-form">
                <div class="form-group">
                    <label for="register-username">用户名</label>
                    <input type="text" id="register-username" placeholder="请输入用户名" required>
                </div>
                <div class="form-group">
                    <label for="register-email">邮箱</label>
                    <input type="email" id="register-email" placeholder="请输入邮箱" required>
                </div>
                <div class="form-group">
                    <label for="register-password">密码</label>
                    <input type="password" id="register-password" placeholder="请输入密码（至少6位）" required minlength="6">
                </div>
                <button type="submit" class="btn">注册</button>
                <div class="toggle-form">
                    <p>已有账号？ <a href="#" id="toggle-login">立即登录</a></p>
                </div>
            </form>
        </div>
    </div>
    
    <script>
        // 切换表单
        document.getElementById('toggle-register').addEventListener('click', function(e) {
            e.preventDefault();
            document.getElementById('login-form').style.display = 'none';
            document.getElementById('register-form').style.display = 'block';
            document.getElementById('auth-title').textContent = '用户注册';
            document.getElementById('auth-subtitle').textContent = '创建您的账号';
            clearMessages();
        });
        
        document.getElementById('toggle-login').addEventListener('click', function(e) {
            e.preventDefault();
            document.getElementById('register-form').style.display = 'none';
            document.getElementById('login-form').style.display = 'block';
            document.getElementById('auth-title').textContent = '用户登录';
            document.getElementById('auth-subtitle').textContent = '请输入您的账号信息';
            clearMessages();
        });
        
        // 清除消息
        function clearMessages() {
            document.getElementById('error-message').style.display = 'none';
            document.getElementById('success-message').style.display = 'none';
        }
        
        // 显示错误消息
        function showError(message, elementId = 'error-message') {
            const errorEl = document.getElementById(elementId);
            errorEl.textContent = message;
            errorEl.style.display = 'block';
        }
        
        // 显示成功消息
        function showSuccess(message, elementId = 'success-message') {
            const successEl = document.getElementById(elementId);
            successEl.textContent = message;
            successEl.style.display = 'block';
        }
        
        // 清除消息
        function clearMessages(elementId = 'login-message') {
            const errorEl = document.getElementById(elementId);
            if (errorEl) {
                errorEl.style.display = 'none';
            }
            const successEl = document.getElementById(elementId.replace('error', 'success') || 'success-message');
            if (successEl) {
                successEl.style.display = 'none';
            }
        }
        
        // 登录表单提交
        document.getElementById('login-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            clearMessages();
            
            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value;
            
            // 表单验证
            if (!email || !password) {
                showError('请填写邮箱和密码');
                return;
            }
            
            console.log('开始登录请求:', { email });
            
            try {
                // 检测当前环境，自动选择API URL
                const isLocal = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
                const apiUrl = isLocal ? 'http://localhost:3000/api/auth/login' : 'https://ancient-china-architecture.onrender.com/api/auth/login';
                console.log('API URL:', apiUrl);
                
                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email, password })
                });
                
                console.log('响应状态:', response.status);
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const data = await response.json();
                console.log('响应数据:', data);
                
                if (data.success) {
                    // 保存用户信息到localStorage
                    localStorage.setItem('user', JSON.stringify(data.user));
                    localStorage.setItem('token', data.user.token);
                    
                    showSuccess('登录成功，正在跳转...');
                    
                    // 跳转到论坛页面
                    setTimeout(() => {
                        window.location.href = 'forum.html';
                    }, 1500);
                } else {
                    showError(data.error || '登录失败');
                }
            } catch (error) {
                console.error('登录失败:', error);
                showError('网络错误: ' + error.message);
            }
        });
        
        // 注册表单提交
        document.getElementById('register-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            clearMessages();
            
            const username = document.getElementById('register-username').value.trim();
            const email = document.getElementById('register-email').value.trim();
            const password = document.getElementById('register-password').value;
            
            // 表单验证
            if (!username || !email || !password) {
                showError('请填写所有必填字段');
                return;
            }
            
            if (password.length < 6) {
                showError('密码长度至少6位');
                return;
            }
            
            // 邮箱格式验证
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                showError('请输入有效的邮箱地址');
                return;
            }
            
            console.log('开始注册请求:', { username, email });
            
            try {
                // 检测当前环境，自动选择API URL
                const isLocal = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
                const apiUrl = isLocal ? 'http://localhost:3000/api/auth/register' : 'https://ancient-china-architecture.onrender.com/api/auth/register';
                console.log('API URL:', apiUrl);
                
                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, email, password })
                });
                
                console.log('响应状态:', response.status);
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const data = await response.json();
                console.log('响应数据:', data);
                
                if (data.success) {
                    // 保存用户信息到localStorage
                    localStorage.setItem('user', JSON.stringify(data.user));
                    localStorage.setItem('token', data.user.token);
                    
                    showSuccess('注册成功，正在跳转...');
                    
                    // 跳转到论坛页面
                    setTimeout(() => {
                        window.location.href = 'forum.html';
                    }, 1500);
                } else {
                    showError(data.error || '注册失败');
                }
            } catch (error) {
                console.error('注册失败:', error);
                showError('网络错误: ' + error.message);
            }
        });
        
        // 检查是否已登录
        // 获取API基础URL
        function getApiBaseUrl() {
            const isLocal = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
            return isLocal ? 'http://localhost:3000' : 'https://ancient-china-architecture.onrender.com';
        }
        
        // 显示修改个人信息表单
        function showProfileForm() {
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('register-section').style.display = 'none';
            document.getElementById('profile-section').style.display = 'block';
            loadUserProfile();
        }
        
        // 加载用户个人信息
        async function loadUserProfile() {
            try {
                const token = localStorage.getItem('token');
                if (!token) {
                    // 没有token，显示登录表单
                    document.getElementById('profile-section').style.display = 'none';
                    document.getElementById('login-section').style.display = 'block';
                    document.getElementById('register-section').style.display = 'none';
                    showError('请先登录后再修改个人信息');
                    return;
                }
                
                const response = await fetch(`${getApiBaseUrl()}/api/auth/me`, {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    }
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const data = await response.json();
                if (data.success) {
                    document.getElementById('profile-username').value = data.user.username;
                    document.getElementById('profile-email').value = data.user.email;
                }
            } catch (error) {
                console.error('加载个人信息失败:', error);
                showError('加载个人信息失败', 'profile-message');
            }
        }
        
        // 保存个人信息
        async function saveProfile(event) {
            event.preventDefault();
            clearMessages('profile-message');
            
            const username = document.getElementById('profile-username').value.trim();
            const email = document.getElementById('profile-email').value.trim();
            const password = document.getElementById('profile-password').value;
            
            // 表单验证
            if (!username || !email) {
                showError('请填写用户名和邮箱', 'profile-message');
                return;
            }
            
            if (password && password.length < 6) {
                showError('密码长度至少6位', 'profile-message');
                return;
            }
            
            // 邮箱格式验证
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                showError('请输入有效的邮箱地址', 'profile-message');
                return;
            }
            
            try {
                const token = localStorage.getItem('token');
                if (!token) {
                    window.location.href = 'auth.html';
                    return;
                }
                
                const response = await fetch(`${getApiBaseUrl()}/api/auth/profile`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ username, email, password })
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const data = await response.json();
                if (data.success) {
                    // 更新localStorage中的用户信息
                    localStorage.setItem('user', JSON.stringify(data.user));
                    localStorage.setItem('token', data.user.token);
                    
                    showSuccess('个人信息更新成功', 'profile-message');
                    
                    // 3秒后跳转到论坛页面
                    setTimeout(() => {
                        window.location.href = 'forum.html';
                    }, 1500);
                } else {
                    showError(data.error || '更新失败', 'profile-message');
                }
            } catch (error) {
                console.error('更新个人信息失败:', error);
                showError('网络错误: ' + error.message, 'profile-message');
            }
        }
        
        // 返回登录页面
        function backToLogin() {
            document.getElementById('profile-section').style.display = 'none';
            document.getElementById('login-section').style.display = 'block';
            document.getElementById('register-section').style.display = 'none';
        }
        
        function checkAuth() {
            const token = localStorage.getItem('token');
            if (token) {
                // 跳转到论坛页面
                window.location.href = 'forum.html';
            }
        }
        
        // 页面加载时检查
        window.onload = function() {
            // 检查URL参数
            const urlParams = new URLSearchParams(window.location.search);
            const action = urlParams.get('action');
            
            if (action === 'profile') {
                // 显示个人信息修改表单
                showProfileForm();
            } else {
                checkAuth();
            }
            
            // 绑定修改个人信息表单提交事件
            const profileForm = document.getElementById('profile-form');
            if (profileForm) {
                profileForm.addEventListener('submit', saveProfile);
            }
            
            // 绑定返回登录按钮事件
            const backToLoginBtn = document.getElementById('back-to-login');
            if (backToLoginBtn) {
                backToLoginBtn.addEventListener('click', backToLogin);
            }
        };
    </script>
    
    <!-- 智能翻译小部件 -->
    <script src="translator-widget.js"></script>
    <script>
        function toggleTranslator() {
            const widget = document.getElementById('translator-widget');
            if (widget) {
                const panel = widget.querySelector('.translator-panel');
                if (panel) {
                    panel.classList.toggle('active');
                }
            }
        }
        
        // 搜索功能
        function search() {
            const searchTerm = document.getElementById('searchInput').value.trim();
            if (searchTerm) {
                window.open(`https://baike.baidu.com/search/word?word=${encodeURIComponent(searchTerm)}`, '_blank');
            }
        }
    </script>
    
    <!-- 修改个人信息表单 -->
    <div id="profile-section" class="form-container" style="display: none;">
        <h2>修改个人信息</h2>
        <p>更新您的账户信息</p>
        
        <div id="profile-message"></div>
        
        <form id="profile-form">
            <div class="form-group">
                <label for="profile-username">用户名</label>
                <input type="text" id="profile-username" class="form-input" placeholder="请输入用户名">
            </div>
            
            <div class="form-group">
                <label for="profile-email">邮箱</label>
                <input type="email" id="profile-email" class="form-input" placeholder="请输入邮箱">
            </div>
            
            <div class="form-group">
                <label for="profile-password">新密码</label>
                <input type="password" id="profile-password" class="form-input" placeholder="留空表示不修改密码">
            </div>
            
            <button type="submit" class="form-button">保存修改</button>
            
            <div class="form-footer">
                <span id="back-to-login">返回登录</span>
            </div>
        </form>
    </div>
</body>
</html>
