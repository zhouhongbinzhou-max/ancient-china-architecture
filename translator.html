<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能翻译器 - 中国古代建筑文化平台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Noto Serif SC', 'SimSun', serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 80px 20px 40px;
        }
        
        .navbar {
            background: linear-gradient(135deg, #2C3E50 0%, #1A252F 100%);
            padding: 15px 50px;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid #8B4513;
            box-shadow: 0 2px 15px rgba(0,0,0,0.5);
        }
        
        .navbar-brand {
            color: #DAA520;
            font-size: 1.6rem;
            font-weight: 900;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 12px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        
        .navbar-brand img {
            width: 40px;
            height: 40px;
            border-radius: 4px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .translator-card {
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            margin-bottom: 30px;
        }
        
        .translator-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            padding: 30px;
            text-align: center;
        }
        
        .translator-header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .translator-header p {
            font-size: 1.1rem;
            opacity: 0.95;
        }
        
        .translator-body {
            padding: 40px;
        }
        
        .url-input-section {
            margin-bottom: 30px;
        }
        
        .url-input-section label {
            display: block;
            font-size: 1.1rem;
            font-weight: 600;
            color: #2C3E50;
            margin-bottom: 10px;
        }
        
        .url-input-wrapper {
            display: flex;
            gap: 10px;
        }
        
        .url-input {
            flex: 1;
            padding: 15px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s;
        }
        
        .url-input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
        }
        
        .load-btn {
            padding: 15px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            white-space: nowrap;
        }
        
        .load-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102,126,234,0.4);
        }
        
        .translation-controls {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            align-items: center;
        }
        
        .control-group {
            flex: 1;
        }
        
        .control-group label {
            display: block;
            font-size: 0.95rem;
            font-weight: 600;
            color: #555;
            margin-bottom: 8px;
        }
        
        .language-select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
            background: #fff;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .language-select:focus {
            border-color: #667eea;
        }
        
        .translate-btn {
            padding: 15px 40px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 24px;
        }
        
        .translate-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(245,87,108,0.4);
        }
        
        .translate-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        
        .preview-frame {
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            overflow: hidden;
            margin-top: 20px;
        }
        
        .preview-header {
            background: #f5f5f5;
            padding: 15px 20px;
            border-bottom: 2px solid #e0e0e0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .preview-title {
            font-size: 1rem;
            font-weight: 600;
            color: #555;
        }
        
        .preview-actions {
            display: flex;
            gap: 10px;
        }
        
        .action-btn {
            padding: 8px 15px;
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .action-btn:hover {
            background: #667eea;
            color: #fff;
            border-color: #667eea;
        }
        
        .preview-content {
            height: 600px;
            border: none;
            width: 100%;
            background: #fff;
        }
        
        .quick-links {
            background: #fff;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .quick-links h3 {
            font-size: 1.3rem;
            color: #2C3E50;
            margin-bottom: 20px;
        }
        
        .quick-links-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 15px;
        }
        
        .quick-link-btn {
            padding: 15px 20px;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            border: none;
            border-radius: 10px;
            text-align: left;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.95rem;
            color: #2C3E50;
            font-weight: 500;
        }
        
        .quick-link-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
        }
        
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .status-message {
            padding: 15px 20px;
            border-radius: 8px;
            margin-top: 20px;
            display: none;
        }
        
        .status-message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }
        
        .status-message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="navbar-brand">
            <img src="assets/logo.png" alt="Logo">
            <span>智能翻译器</span>
        </a>
    </nav>
    
    <div class="container">
        <div class="translator-card">
            <div class="translator-header">
                <h1>🌐 智能翻译器</h1>
                <p>实时翻译任何页面内容，支持全球 100+ 种语言</p>
            </div>
            
            <div class="translator-body">
                <div class="url-input-section">
                    <label for="urlInput">📍 输入要翻译的页面 URL：</label>
                    <div class="url-input-wrapper">
                        <input type="url" id="urlInput" class="url-input" placeholder="例如：http://localhost:3001/index.html" value="http://localhost:3001/index.html">
                        <button class="load-btn" onclick="loadPage()">加载页面</button>
                    </div>
                </div>
                
                <div class="translation-controls">
                    <div class="control-group">
                        <label for="sourceLang"> 源语言：</label>
                        <select id="sourceLang" class="language-select">
                            <option value="zh">中文 (Chinese)</option>
                            <option value="en">英语 (English)</option>
                            <option value="ja">日语 (日本語)</option>
                            <option value="ko">韩语 (한국어)</option>
                            <option value="fr">法语 (Français)</option>
                            <option value="es">西班牙语 (Español)</option>
                            <option value="de">德语 (Deutsch)</option>
                            <option value="ru">俄语 (Русский)</option>
                            <option value="pt">葡萄牙语 (Português)</option>
                            <option value="it">意大利语 (Italiano)</option>
                        </select>
                    </div>
                    
                    <div class="control-group">
                        <label for="targetLang">🌍 目标语言：</label>
                        <select id="targetLang" class="language-select">
                            <option value="en">英语 (English)</option>
                            <option value="zh">中文 (Chinese)</option>
                            <option value="ja">日语 (日本語)</option>
                            <option value="ko">韩语 (한국어)</option>
                            <option value="fr">法语 (Français)</option>
                            <option value="es">西班牙语 (Español)</option>
                            <option value="de">德语 (Deutsch)</option>
                            <option value="ru">俄语 (Русский)</option>
                            <option value="pt">葡萄牙语 (Português)</option>
                            <option value="it">意大利语 (Italiano)</option>
                        </select>
                    </div>
                    
                    <button class="translate-btn" id="translateBtn" onclick="translatePage()">
                        🔄 开始翻译
                    </button>
                </div>
                
                <div class="preview-frame">
                    <div class="preview-header">
                        <span class="preview-title">📄 翻译预览</span>
                        <div class="preview-actions">
                            <button class="action-btn" onclick="openInNewTab()">在新标签页打开</button>
                            <button class="action-btn" onclick="refreshPreview()">刷新</button>
                        </div>
                    </div>
                    <iframe id="previewFrame" class="preview-content" src="about:blank"></iframe>
                </div>
                
                <div id="statusMessage" class="status-message"></div>
            </div>
        </div>
        
        <div class="quick-links">
            <h3>🚀 快速访问</h3>
            <div class="quick-links-grid">
                <button class="quick-link-btn" onclick="loadPageWithUrl('http://localhost:3001/index.html')">🏠 主页</button>
                <button class="quick-link-btn" onclick="loadPageWithUrl('http://localhost:3001/test-ai.html')">🤖 AI 问答</button>
                <button class="quick-link-btn" onclick="loadPageWithUrl('http://localhost:3001/about.html')">ℹ️ 关于我们</button>
                <button class="quick-link-btn" onclick="loadPageWithUrl('http://localhost:3001/contact.html')">📧 联系我们</button>
                <button class="quick-link-btn" onclick="loadPageWithUrl('http://localhost:3001/famous-buildings.html')">🏛️ 著名建筑</button>
                <button class="quick-link-btn" onclick="loadPageWithUrl('http://localhost:3001/cultural-cities.html')">🏙️ 文化名城</button>
                <button class="quick-link-btn" onclick="loadPageWithUrl('http://localhost:3001/architecture-culture.html')">📚 建筑文化</button>
                <button class="quick-link-btn" onclick="loadPageWithUrl('http://localhost:3001/architecture-style.html')">🎨 建筑风格</button>
            </div>
        </div>
    </div>

    <script>
        // 当前加载的页面 URL
        let currentPageUrl = '';
        
        // 加载页面
        function loadPage() {
            const url = document.getElementById('urlInput').value.trim();
            
            if (!url) {
                showStatus('请输入有效的 URL', 'error');
                return;
            }
            
            currentPageUrl = url;
            const frame = document.getElementById('previewFrame');
            frame.src = url + '?t=' + Date.now(); // 添加时间戳避免缓存
            
            showStatus('页面加载成功！', 'success');
        }
        
        // 使用指定 URL 加载页面
        function loadPageWithUrl(url) {
            document.getElementById('urlInput').value = url;
            loadPage();
        }
        
        // 翻译页面
        async function translatePage() {
            const frame = document.getElementById('previewFrame');
            const sourceLang = document.getElementById('sourceLang').value;
            const targetLang = document.getElementById('targetLang').value;
            const translateBtn = document.getElementById('translateBtn');
            
            if (!currentPageUrl) {
                showStatus('请先加载一个页面', 'error');
                return;
            }
            
            if (sourceLang === targetLang) {
                showStatus('源语言和目标语言不能相同', 'error');
                return;
            }
            
            // 禁用按钮，显示加载状态
            translateBtn.disabled = true;
            translateBtn.innerHTML = '<span class="loading"></span> 翻译中...';
            
            try {
                // 获取 iframe 中的内容
                const iframeContent = frame.contentWindow.document;
                
                // 获取所有需要翻译的文本
                const textsToTranslate = extractTexts(iframeContent);
                
                if (textsToTranslate.length === 0) {
                    showStatus('没有找到可翻译的文本', 'error');
                    translateBtn.disabled = false;
                    translateBtn.innerHTML = '🔄 开始翻译';
                    return;
                }
                
                // 批量翻译文本
                showStatus(`正在翻译 ${textsToTranslate.length} 个文本块...`, 'success');
                
                for (let i = 0; i < textsToTranslate.length; i++) {
                    const element = textsToTranslate[i];
                    const originalText = element.text;
                    
                    try {
                        // 调用翻译 API
                        const translatedText = await callTranslateAPI(originalText, sourceLang, targetLang);
                        
                        // 更新元素内容
                        if (element.node.nodeType === Node.TEXT_NODE) {
                            element.node.textContent = translatedText;
                        } else {
                            element.node.textContent = translatedText;
                        }
                        
                        // 更新状态
                        showStatus(`翻译进度：${i + 1}/${textsToTranslate.length}`, 'success');
                    } catch (error) {
                        console.error('翻译失败:', error);
                    }
                }
                
                showStatus('翻译完成！', 'success');
            } catch (error) {
                console.error('翻译错误:', error);
                showStatus('翻译失败：' + error.message, 'error');
            } finally {
                translateBtn.disabled = false;
                translateBtn.innerHTML = '🔄 开始翻译';
            }
        }
        
        // 提取需要翻译的文本
        function extractTexts(doc) {
            const texts = [];
            const walker = document.createTreeWalker(
                doc.body,
                NodeFilter.SHOW_TEXT,
                null,
                false
            );
            
            let node;
            while (node = walker.nextNode()) {
                const text = node.textContent.trim();
                // 过滤掉空白文本、脚本、样式等内容
                if (text.length > 2 && 
                    !node.parentNode.closest('script, style, textarea, code, pre') &&
                    !/^\s*$/.test(text)) {
                    texts.push({
                        node: node,
                        text: text
                    });
                }
            }
            
            return texts;
        }
        
        // 调用翻译 API
        async function callTranslateAPI(text, from, to) {
            // 腾讯云部署时使用函数 URL，本地开发使用 localhost
            const API_BASE = window.location.hostname === 'localhost' 
                ? 'http://localhost:3001' 
                : 'https://1416972799-jvl67ua8j5.ap-guangzhou.tencentscf.com';
            
            const response = await fetch(API_BASE + '/api/translate', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    q: text,
                    from: from,
                    to: to
                })
            });
            
            if (!response.ok) {
                throw new Error('翻译 API 调用失败');
            }
            
            const data = await response.json();
            return data.translatedText || text;
        }
        
        // 在新标签页打开
        function openInNewTab() {
            if (!currentPageUrl) {
                showStatus('请先加载一个页面', 'error');
                return;
            }
            
            const frame = document.getElementById('previewFrame');
            const newWindow = window.open();
            newWindow.document.write(frame.contentWindow.document.documentElement.outerHTML);
            newWindow.document.close();
        }
        
        // 刷新预览
        function refreshPreview() {
            if (currentPageUrl) {
                loadPage();
            }
        }
        
        // 显示状态消息
        function showStatus(message, type) {
            const statusEl = document.getElementById('statusMessage');
            statusEl.textContent = message;
            statusEl.className = 'status-message ' + type;
            
            // 3 秒后自动隐藏
            setTimeout(() => {
                statusEl.style.display = 'none';
            }, 5000);
        }
        
        // 页面加载完成后初始化
        window.addEventListener('DOMContentLoaded', () => {
            // 自动加载主页
            setTimeout(() => {
                loadPage();
            }, 500);
        });
    </script>
</body>
</html>
